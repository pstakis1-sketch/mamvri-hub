<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamvri — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#071E3A;color:#fff;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden;position:relative}
    .bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
    .g1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(49,95,147,0.25) 0%,transparent 70%);top:-150px;right:-150px;animation:f1 12s ease-in-out infinite}
    .g2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(111,141,178,0.12) 0%,transparent 70%);bottom:-100px;left:-100px;animation:f2 15s ease-in-out infinite}
    @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,20px) scale(1.05)}}
    @keyframes f2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.08)}}
    .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(111,141,178,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(111,141,178,0.03) 1px,transparent 1px);background-size:60px 60px}
    .content{position:relative;z-index:1;padding:2rem}
    .logo{margin-bottom:3rem;opacity:0;animation:fadeUp .8s ease forwards .2s}
    .logo svg{width:100px;height:auto}
    h1{font-size:clamp(1.5rem,3vw,2.5rem);font-weight:700;letter-spacing:-0.03em;margin-bottom:.75rem;opacity:0;animation:fadeUp .8s ease forwards .4s}
    .sub{font-size:clamp(.9rem,1.5vw,1.1rem);color:#A8BDD4;font-weight:300;margin-bottom:2.5rem;opacity:0;animation:fadeUp .8s ease forwards .6s}
    .email{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.25rem;border:1px solid rgba(111,141,178,0.2);border-radius:10px;color:#6F8DB2;font-size:.85rem;text-decoration:none;transition:all .3s;opacity:0;animation:fadeUp .8s ease forwards .8s}
    .email:hover{border-color:rgba(111,141,178,0.4);color:#fff;background:rgba(111,141,178,0.06)}
    .email svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="bg">
    <div class="g1"></div>
    <div class="g2"></div>
    <div class="grid"></div>
  </div>
  <div class="content">
    <div class="logo">
      <svg viewBox="0 0 276 170" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 170V72C0 32.24 32.24 0 72 0C111.76 0 144 32.24 144 72V170H96V72C96 58.745 85.255 48 72 48C58.745 48 48 58.745 48 72V170H0Z" fill="#fff"/>
        <path d="M132 170V72C132 32.24 164.24 0 204 0C243.76 0 276 32.24 276 72V170H228V72C228 58.745 217.255 48 204 48C190.745 48 180 58.745 180 72V170H132Z" fill="rgba(255,255,255,0.45)"/>
        <path d="M132 170V72C132 45.7 146.09 22.7 167.12 10.14C152.7 25.68 144 47.22 144 72V170H132Z" fill="rgba(255,255,255,0.65)" opacity="0.9"/>
      </svg>
    </div>
    <h1>Ερχόμαστε σύντομα</h1>
    <p class="sub">Ψηφιακές λύσεις για παραδοσιακούς κλάδους</p>
    <a href="mailto:info@mamvri.com" class="email">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
      info@mamvri.com
    </a>
  </div>
</body>
</html>
